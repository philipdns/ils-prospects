  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

L SCALE (built off of brand ink)\n     ---------------------------------------------------------------------- */\n  --si-neutral-50:  #F7F8FA;\n  --si-neutral-100: #EEF0F4;\n  --si-neutral-200: #DEE2EA;\n  --si-neutral-300: #C4CAD6;\n  --si-neutral-400: #98A0B0;\n  --si-neutral-500: #6A7387;\n  --si-neutral-600: #4A5163;\n  --si-neutral-700: #333845;\n  --si-neutral-800: #22252E;\n  --si-neutral-900: #121319;\n\n  /* ----------------------------------------------------------------------\n     SEMANTIC\n     ---------------------------------------------------------------------- */\n  --si-success: #1F8A5C;\n  --si-warning: #D08A1E;\n  --si-danger:  #C8372D;\n  --si-info:    var(--si-navy);\n\n  /* Warm organic accent — proposed. Use sparingly (<5% of surface):\n     data viz highlights, illustration lines, pull-quote marks, never primary CTAs. */\n  --si-clay:       #C07B4A;\n  --si-clay-soft:  #EFD9C6;\n  --si-ochre:      #B88A3E;\n\n  /* ----------------------------------------------------------------------\n     SURFACE / FG TOKENS\n     Use these, not raw colors.\n     ---------------------------------------------------------------------- */\n  --bg:          var(--si-white);\n  --bg-elev:     var(--si-white);\n  --bg-subtle:   var(--si-neutral-50);\n  --bg-muted:    var(--si-light-blue-soft);\n  --bg-accent:   var(--si-light-blue);\n  --bg-inverse:  var(--si-ink);\n\n  --fg:          var(--si-ink);\n  --fg-muted:    var(--si-neutral-500);\n  --fg-subtle:   var(--si-neutral-400);\n  --fg-on-brand: var(--si-white);\n  --fg-brand:    var(--si-navy);\n\n  --border:         var(--si-neutral-200);\n  --border-strong:  var(--si-neutral-300);\n  --border-accent:  var(--si-light-blue);\n  --ring:           var(--si-navy);\n\n  /* ----------------------------------------------------------------------\n     TYPE FAMILIES\n     Display  = Work Sans (matches the logo wordmark; use 700–900 for lockups)\n     UI/Body  = Adelle Sans (premium, license required) → DM Sans fallback\n     Mono     = JetBrains Mono\n     ---------------------------------------------------------------------- */\n  --font-display: 'Work Sans', system-ui, sans-serif;          /* headlines */\n  --font-sans:    'Adelle Sans', 'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; /* body */\n  --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* ----------------------------------------------------------------------\n     TYPE SCALE (base 16)\n     ---------------------------------------------------------------------- */\n  --fs-12: 0.75rem;\n  --fs-14: 0.875rem;\n  --fs-16: 1rem;\n  --fs-18: 1.125rem;\n  --fs-20: 1.25rem;\n  --fs-24: 1.5rem;\n  --fs-30: 1.875rem;\n  --fs-36: 2.25rem;\n  --fs-48: 3rem;\n  --fs-60: 3.75rem;\n  --fs-72: 4.5rem;\n\n  --lh-tight:  1.1;\n  --lh-snug:   1.25;\n  --lh-normal: 1.5;\n  --lh-loose:  1.7;\n\n  --tracking-display: -0.01em;\n  --tracking-body:    0;\n  --tracking-eyebrow: 0.12em;\n\n  /* ----------------------------------------------------------------------\n     RADII, SHADOWS, SPACING\n     ---------------------------------------------------------------------- */\n  --radius-sm: 0.5rem;\n  --radius:    0.75rem;\n  --radius-lg: 1rem;\n  --radius-xl: 1.5rem;\n  --radius-pill: 999px;\n\n  --shadow-sm: 0 2px 8px  hsl(220 63% 39% / 0.08);\n  --shadow-md: 0 8px 24px hsl(220 63% 39% / 0.12);\n  --shadow-lg: 0 16px 40px hsl(220 63% 39% / 0.16);\n  --shadow-xl: 0 24px 64px hsl(220 63% 39% / 0.22);\n\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* ----------------------------------------------------------------------\n     MOTION\n     ---------------------------------------------------------------------- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);\n  --ease-emphasized: cubic-bezier(0.2, 0, 0, 1);\  -0.035em; font-weight: 800; }\n  h2 { font-size: 64px; line-height: 1.05; letter-spacing: -0.025em; }\n  h3 { font-size: 30px; font-weight: 600; letter-spacing: -0.01em; }\n  p  { margin: 0; text-wrap: pretty; }\n\n  .eyebrow {\n    font-family: var(--font-display);\n    font-size: 13px;\n    font-weight: 600;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--si-navy);\n  }\n  .eyebrow.clay { color: #8B4A1F; }\n\n  .tm { font-size: 0.55em; vertical-align: super; margin-left: 2px; color: var(--si-navy); opacity: 0.8; font-weight: 500; }\n\n  /* chrome — top-right brand mark on content slides */\n  .chrome {\n    position: absolute; top: 48px; left: 128px; right: 128px;\n    display: flex; align-items: center; justify-content: space-between;\n    font-size: 13px; color: var(--fg-muted);\n  }\n  .chrome .mark { height: 28px; display: flex; align-items: center; gap: 10px; }\n  .chrome .mark img { height: 28px; display:block; }\n  .chrome .page { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--fg-muted); }\n\n  /* footer */\n  .foot {\n    position: absolute; bottom: 48px; left: 128px; right: 128px;\n    display: flex; justify-content: space-between; align-items: center;\n    font-size: 12px; color: var(--fg-muted);\n    font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase;\n  }\n\n  /* primitives */\n  .stat-num { font-family: var(--font-display); font-size: 120px; font-weight: 800; color: var(--si-navy); letter-spacing: -0.04em; line-height: 0.95; }\n  .stat-label { font-size: 17px; color: var(--fg-muted); line-height: 1.4; margin-top: 8px; }\n\n  .pill {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 8px 16px; border-radius: 999px;\n    background: var(--si-light-blue-soft); color: var(--si-navy);\n    font-size: 14px; font-weight: 500;\n  }\n  .pill i { font-size: 16px; }\n\n  .btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 18px 32px; border-radius: 999px;\n    background: var(--si-navy); color: #fff;\n    font-family: var(--font-display); font-weight: 600; font-size: 20px;\n    letter-spacing: -0.005em;\n    box-shadow: var(--shadow-md);\n  }\n  .btn.ghost { background: transparent; color: var(--si-navy); border: 1.5px solid var(--border); box-shadow: none; }\n\n  .rule { height: 1px; background: var(--border); width: 100%; }\n\n  /* bg variants */\n  .bg-soft { background: linear-gradient(180deg, #fff 0%, var(--si-light-blue-soft) 100%); }\n  .bg-navy { background: var(--si-navy); color: #fff; }\n  .bg-navy h1, .bg-navy h2, .bg-navy h3 { color: #fff; }\n  .bg-navy .eyebrow { color: #9BB8E9; }\n  .bg-navy p { color: rgba(255,255,255,0.85); }\n  .bg-ink  { background: #0D1A3A; color: #fff; }\n  .bg-ink  h1, .bg-ink h2, .bg-ink h3 { color: #fff; }\n  .bg-ink  .eyebrow { color: #D9A77A; }\n\n  /* grid helpers */\n  .row { display: flex; gap: 48px; }\n  .col { display: flex; flex-direction: column; gap: 24px; flex: 1; }\n  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }\n  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }\n  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }\n\n  /* cards */\n  .card {\n    border: 1px solid var(--border);\n    border-radius: 16px;\n    padding: 32px;\n    background: #fff;\n    box-shadow: var(--shadow-sm);\n  }\n  .card .ic { width: 48px; height: 48px; border-radius: 12px; background: var(--si-light-blue-soft); display:flex; align-items:center; justify-content:center; margin-bottom: 20px; }\n  .card .ic i { font-size: 26px; color: var(--si-navy); }\n  .card.accent .ic { background: #FAEEE3; }\n  .card.accent .ic i { color: #8B4A1F; }\n  .card h3 { font-size: 22px; margin-bottom: 8px; }\n  .card p { font-size: 16px; color: var(--fg-muted); line-height: 1.5; }\n\n  /* numbered step */\n  .step-num {\n    font-family: var(--font-display); font-weight: 800; color: var(--si-navy);\n    font-size: 88px; line-height: 0.9; letter-spacing: -0.04em;\n    opacity: 0.3;\n  }\n\n  /* decorative shapes */\n  .orb {\n    position: absolute; border-radius: 50%;\n    background: radial-gradient(circle at 30% 30%, rgba(37,71,160,0.18), rgba(37,71,160,0) 70%);\n    pointer-events: none;\n  }\n  .clay-orb {\n    position: absolute; border-radius: 50%;\n    background: radial-gradient(circle at 30% 30%, rgba(192,123,74,0.2), rgba(192,123,74,0) 70%);\n    pointer-events: none;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ═══════════════════════════════════════════════════════════════════ -->\n<!-- TWEAKS: hero variation                                              -->\n<!-- ═══════════════════════════════════════════════════════════════════ -->\n<script>\n  const TWEAKS = /*EDITMODE-BEGIN*/{\n    \"heroVariation\": \"B\",\n    \"facilitatorFirstName\": \"Garrett\",\n    \"facilitatorLastName\": \"Cliff\",\n    \"facilitatorCompany\": \"your practice\",\n    \"paymentUrl\": \"https:\\/\\/buy.stripe.com\\/5kQeV66BX0cZ0Jm14dbfO01\",\n    \"paymentAmount\": \"$995\",\n    \"nextSteps\": \"Questions first? Reply to this email — I'll get you answers before you commit anything.\\nWhen you're ready, pay the certification fee ({AMOUNT}) to get immediate access to all materials. {PAY_LINK:Pay & enroll}\\nReview the self-guided program at your pace — facilitator guide, quick-tip videos, speaker notes (roughly 8–12 hours).\\nBook a 1-hour coaching call with a Stratton-certified facilitator to walk through your questions live.\\nStart using the ILS with your first client or team.\"\n  }/*EDITMODE-END*/;\n\n  function initTweakBindings() {\n    // apply hero variation — remove non-selected variants from DOM entirely\n    // so they don't count as blank slides in deck-stage's navigation.\n    document.querySelectorAll('[data-hero]').forEach(el => {\n      if (el.dataset.hero !== TWEAKS.heroVariation) el.remove();\n    });\n    // apply text bindings (supports optional data-bind-prefix which is hidden when value is empty)\n    document.querySelectorAll('[data-bind]').forEach(el => {\n      const key = el.dataset.bind;\n      if (TWEAKS[key] == null) return;\n      const val = String(TWEAKS[key]);\n      const prefix = el.dataset.bindPrefix || '';\n      el.textContent = val ? (prefix + val) : '';\n    });\n    // apply href bindings\n    document.querySelectorAll('[data-bind-href]').forEach(el => {\n      const key = el.dataset.bindHref;\n      if (TWEAKS[key] != null) el.setAttribute('href', TWEAKS[key]);\n    });\n    renderNextSteps();\n\n    function renderNextSteps() {\n      const lines = (TWEAKS.nextSteps || '').split(/\\r?\\n/).map(s => s.trim()).filter(Boolean);\n      const payUrl = (TWEAKS.paymentUrl || '#').replace(/\"/g, '&quot;');\n      const amt = (TWEAKS.paymentAmount || '').replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;');\n      document.querySelectorAll('[data-bind-list=\"nextSteps\"]').forEach(ol => {\n        ol.innerHTML = lines.map((line, i) => {\n          // escape first, then re-inject link / amount tokens\n          let html = line.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;');\n          html = html.replace(/\\{AMOUNT\\}/g, `<strong style=\"color:#D9A77A;\">${amt}<\u002Fstrong>`);\n          html = html.replace(/\\{PAY_LINK:([^}]+)\\}/g, (_, label) =>\n            `<a href=\"${payUrl}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:8px; background:#D9A77A; color:#212020; padding:8px 16px; border-radius:999px; font-family: var(--font-display); font-weight:600; font-size:15px; text-decoration:none; margin-left:6px; vertical-align: middle;\">${label.replace(/<\u002Fg,'&lt;')} →<\u002Fa>`);\n          return `\n            <li style=\"display:flex; gap: 28px; align-items: flex-start;\">\n              <span style=\"font-family: var(--font-display); font-size: 32px; font-weight: 700; color: #D9A77A; line-height: 1; min-width: 48px; padding-top: 4px;\">${String(i+1).padStart(2,'0')}<\u002Fspan>\n              <span style=\"color: #fff; font-size: 21px; line-height: 1.5; padding-top: 6px; flex: 1;\">${html}<\u002Fspan>\n            <\u002Fli>`;\n        }).join('');\n      });\n    }\n\n    // edit mode protocol\n    let panelVisible = false;\n    window.addEventListener('message', (e) => {\n      if (!e.data || !e.data.type) return;\n      if (e.data.type === '__activate_edit_mode') { panelVisible = true; renderPanel(); }\n      if (e.data.type === '__deactivate_edit_mode') { panelVisible = false; renderPanel(); }\n    });\n    window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n    function renderPanel() {\n      let p = document.getElementById('tweaks-panel');\n      if (!panelVisible) { if (p) p.remove(); return; }\n      if (p) return;\n      p = document.createElement('div');\n      p.id = 'tweaks-panel';\n      p.style.cssText = `\n        position: fixed; bottom: 20px; right: 20px; z-index: 2147483647;\n        background: #fff; border: 1px solid #E2E8F0; border-radius: 12px;\n        padding: 18px 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);\n        font-family: 'DM Sans', sans-serif; font-size: 13px; width: 320px;\n        max-height: 85vh; overflow-y: auto;\n      `;\n      p.innerHTML = `\n        <div style=\"font-family:'Work Sans'; font-weight:700; font-size:14px; margin-bottom:12px; color:#212020;\">Tweaks<\u002Fdiv>\n\n        <label style=\"display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6B7280; margin-bottom:6px;\">Hero variation<\u002Flabel>\n        <div style=\"display:flex; gap:6px; margin-bottom:14px;\">\n          ${['A','B','C'].map(v => `<button data-hero-pick=\"${v}\" style=\"flex:1; padding:8px 0; border-radius:8px; border:1px solid ${TWEAKS.heroVariation===v?'#2547A0':'#E2E8F0'}; background:${TWEAKS.heroVariation===v?'#2547A0':'#fff'}; color:${TWEAKS.heroVariation===v?'#fff':'#212020'}; font-weight:600; cursor:pointer; font-family:inherit;\">${v}<\u002Fbutton>`).join('')}\n        <\u002Fdiv>\n\n        <div style=\"display: flex; gap: 8px; margin-bottom: 10px;\">\n          <div style=\"flex: 1;\">\n            <label style=\"display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6B7280; margin-bottom:6px;\">First name<\u002Flabel>\n            <input id=\"tw-first\" value=\"${TWEAKS.facilitatorFirstName || ''}\" style=\"width:100%; padding:8px 10px; border:1px solid #E2E8F0; border-radius:8px; font-family:inherit; font-size:13px;\">\n          <\u002Fdiv>\n          <div style=\"flex: 1;\">\n            <label style=\"display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6B7280; margin-bottom:6px;\">Last name<\u002Flabel>\n            <input id=\"tw-last\" value=\"${TWEAKS.facilitatorLastName || ''}\" style=\"width:100%; padding:8px 10px; border:1px solid #E2E8F0; border-radius:8px; font-family:inherit; font-size:13px;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <label style=\"display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6B7280; margin-bottom:6px;\">Their company<\u002Flabel>\n        <input id=\"tw-co\" value=\"${TWEAKS.facilitatorCompany}\" style=\"width:100%; padding:8px 10px; border:1px solid #E2E8F0; border-radius:8px; font-family:inherit; font-size:13px; margin-bottom:14px;\">\n\n        <label style=\"display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6B7280; margin-bottom:6px;\">Payment link (certification)<\u002Flabel>\n        <input id=\"tw-pay\" value=\"${TWEAKS.paymentUrl}\" style=\"width:100%; padding:8px 10px; border:1px solid #E2E8F0; border-radius:8px; font-family:inherit; font-size:12px; margin-bottom:10px;\">\n\n        <label style=\"display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6B7280; margin-bottom:6px;\">Amount<\u002Flabel>\n        <input id=\"tw-amt\" value=\"${TWEAKS.paymentAmount}\" style=\"width:100%; padding:8px 10px; border:1px solid #E2E8F0; border-radius:8px; font-family:inherit; font-size:13px; margin-bottom:14px;\">\n\n        <label style=\"display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6B7280; margin-bottom:6px;\">Next steps (one per line)<\u002Flabel>\n        <textarea id=\"tw-steps\" rows=\"6\" style=\"width:100%; padding:8px 10px; border:1px solid #E2E8F0; border-radius:8px; font-family:inherit; font-size:12px; resize:vertical; line-height:1.4;\">${TWEAKS.nextSteps.replace(/<\u002Fg,'&lt;')}<\u002Ftextarea>\n      `;\n      document.body.appendChild(p);\n      p.querySelectorAll('[data-hero-pick]').forEach(b => {\n        b.addEventListener('click', () => {\n          const v = b.dataset.heroPick;\n          TWEAKS.heroVariation = v;\n          // non-selected hero variants were removed at init; a reload is\n          // required to pick a different one.\n          window.parent.postMessage({type:'__edit_mode_set_keys', edits:{heroVariation:v}}, '*');\n          p.remove(); renderPanel();\n        });\n      });\n      const updateNameBindings = (key, val) => {\n        document.querySelectorAll(`[data-bind=\"${key}\"]`).forEach(el => {\n          const prefix = el.dataset.bindPrefix || '';\n          el.textContent = val ? (prefix + val) : '';\n        });\n      };\n      p.querySelector('#tw-first').addEventListener('input', e => {\n        TWEAKS.facilitatorFirstName = e.target.value;\n        updateNameBindings('facilitatorFirstName', e.target.value);\n        window.parent.postMessage({type:'__edit_mode_set_keys', edits:{facilitatorFirstName:e.target.value}}, '*');\n      });\n      p.querySelector('#tw-last').addEventListener('input', e => {\n        TWEAKS.facilitatorLastName = e.target.value;\n        updateNameBindings('facilitatorLastName', e.target.value);\n        window.parent.postMessage({type:'__edit_mode_set_keys', edits:{facilitatorLastName:e.target.value}}, '*');\n      });\n      p.querySelector('#tw-co').addEventListener('input', e => {\n        TWEAKS.facilitatorCompany = e.target.value;\n        document.querySelectorAll('[data-bind=\"facilitatorCompany\"]').forEach(el => el.textContent = e.target.value);\n        window.parent.postMessage({type:'__edit_mode_set_keys', edits:{facilitatorCompany:e.target.value}}, '*');\n      });\n      p.querySelector('#tw-steps').addEventListener('input', e => {\n        TWEAKS.nextSteps = e.target.value;\n        renderNextSteps();\n        window.parent.postMessage({type:'__edit_mode_set_keys', edits:{nextSteps:e.target.value}}, '*');\n      });\n      p.querySelector('#tw-pay').addEventListener('input', e => {\n        TWEAKS.paymentUrl = e.target.value;\n        renderNextSteps();\n        document.querySelectorAll('a[data-bind-href=\"paymentUrl\"]').forEach(a => a.href = e.target.value);\n        window.parent.postMessage({type:'__edit_mode_set_keys', edits:{paymentUrl:e.target.value}}, '*');\n      });\n      p.querySelector('#tw-amt').addEventListener('input', e => {\n        TWEAKS.paymentAmount = e.target.value;\n        renderNextSteps();\n        window.parent.postMessage({type:'__edit_mode_set_keys', edits:{paymentAmount:e.target.value}}, '*');\n      });\n    }\n  }\n\n  // run bindings immediately if DOM ready, else after DOMContentLoaded.\n  // (the standalone/bundled build injects the script DOM after DOMContentLoaded\n  // has already fired, so we can't rely on the event alone.)\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', initTweakBindings);\n  } else {\n    initTweakBindings();\n  }\n<\u002Fscript>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ───────────── 01A · COVER (variant A: editorial, navy-heavy) ───────────── -->\n  <section data-label=\"Cover\" data-hero=\"A\" style=\"padding: 0; position: relative; background: #fff;\">\n    <div style=\"display:flex; height:100%;\">\n      <!-- left: type -->\n      <div style=\"flex: 1.15; padding: 128px 96px; display:flex; flex-direction:column; justify-content:space-between;\">\n        <img src=\"cc5669a2-0f09-4597-b6e7-f259e80c9400\" style=\"height: 44px; width: auto;\" alt=\"Stratton Index\">\n\n        <div>\n          <div class=\"eyebrow\" style=\"margin-bottom: 32px;\">Facilitator Certification · Follow-Up<\u002Fdiv>\n          <h1 style=\"max-width: 780px;\">A shared language<br>for how leaders<br><span style=\"color: var(--si-navy);\">actually show up.<\u002Fspan><\u002Fh1>\n          <p style=\"margin-top: 40px; font-size: 24px; color: var(--fg-muted); max-width: 620px; line-height: 1.5;\">\n            Thanks for the conversation, <span data-bind=\"facilitatorFirstName\" style=\"color: var(--si-ink); font-weight: 500;\">Alex<\u002Fspan><span data-bind=\"facilitatorLastName\" data-bind-prefix=\" \" style=\"color: var(--si-ink); font-weight: 500;\"><\u002Fspan>. Here's the ILS<span class=\"tm\">™<\u002Fspan> in one deck — everything we covered, in a form you can forward.\n          <\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap: 48px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted);\">\n          <span>Stratton Index · 2025<\u002Fspan>\n          <span>Confidential · For <span data-bind=\"facilitatorCompany\" style=\"color: var(--si-ink);\">your practice<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- right: visual block -->\n      <div style=\"flex: 1; background: var(--si-navy); position: relative; overflow: hidden; display:flex; align-items:center; justify-content:center;\">\n        <div class=\"orb\" style=\"width: 900px; height: 900px; top: -200px; right: -300px; background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);\"><\u002Fdiv>\n        <div class=\"clay-orb\" style=\"width: 500px; height: 500px; bottom: 80px; left: -120px; background: radial-gradient(circle, rgba(192,123,74,0.25), transparent 65%);\"><\u002Fdiv>\n\n        <!-- stylized ILS quadrant -->\n        <svg viewBox=\"0 0 400 400\" style=\"width: 480px; height: 480px; position: relative; z-index:1;\" fill=\"none\">\n          <circle cx=\"200\" cy=\"200\" r=\"180\" stroke=\"rgba(255,255,255,0.18)\" stroke-width=\"1\"><\u002Fcircle>\n          <circle cx=\"200\" cy=\"200\" r=\"120\" stroke=\"rgba(255,255,255,0.22)\" stroke-width=\"1\"><\u002Fcircle>\n          <circle cx=\"200\" cy=\"200\" r=\"60\" stroke=\"rgba(255,255,255,0.28)\" stroke-width=\"1\"><\u002Fcircle>\n          <line x1=\"200\" y1=\"20\" x2=\"200\" y2=\"380\" stroke=\"rgba(255,255,255,0.25)\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"20\" y1=\"200\" x2=\"380\" y2=\"200\" stroke=\"rgba(255,255,255,0.25)\" stroke-width=\"1\"><\u002Fline>\n          <!-- data points -->\n          <circle cx=\"270\" cy=\"135\" r=\"8\" fill=\"#C07B4A\"><\u002Fcircle>\n          <circle cx=\"140\" cy=\"170\" r=\"6\" fill=\"rgba(255,255,255,0.6)\"><\u002Fcircle>\n          <circle cx=\"240\" cy=\"260\" r=\"5\" fill=\"rgba(255,255,255,0.4)\"><\u002Fcircle>\n          <circle cx=\"165\" cy=\"245\" r=\"4\" fill=\"rgba(255,255,255,0.3)\"><\u002Fcircle>\n          <!-- quadrant labels -->\n          <text x=\"48\" y=\"80\" fill=\"rgba(255,255,255,0.55)\" font-family=\"Work Sans\" font-size=\"14\" font-weight=\"500\" letter-spacing=\"1.5\">PERSUADING<\u002Ftext>\n          <text x=\"276\" y=\"80\" fill=\"rgba(255,255,255,0.55)\" font-family=\"Work Sans\" font-size=\"14\" font-weight=\"500\" letter-spacing=\"1.5\">COUNSELING<\u002Ftext>\n          <text x=\"52\" y=\"340\" fill=\"rgba(255,255,255,0.55)\" font-family=\"Work Sans\" font-size=\"14\" font-weight=\"500\" letter-spacing=\"1.5\">DIRECTING<\u002Ftext>\n          <text x=\"278\" y=\"340\" fill=\"rgba(255,255,255,0.55)\" font-family=\"Work Sans\" font-size=\"14\" font-weight=\"500\" letter-spacing=\"1.5\">ANALYZING<\u002Ftext>\n        <\u002Fsvg>\n      <\u002F ───────────── 01C · COVER (variant C: bold, stacked) ───────────── -->\n  <section data-label=\"Cover\" data-hero=\"C\" class=\"bg-ink\" style=\"padding: 0; position: relative; overflow: hidden;\">\n    <div class=\"clay-orb\" style=\"width: 800px; height: 800px; bottom: -300px; right: -200px;\"><\u002Fdiv>\n    <div class=\"orb\" style=\"width: 600px; height: 600px; top: -150px; left: -150px;\"><\u002Fdiv>\n\n    <div style=\"padding: 96px 128px; height:100%; display:flex; flex-direction:column; justify-content:space-between; position: relative; z-index: 1;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n        <img src=\"cc5669a2-0f09-4597-b6e7-f259e80c9400\" style=\"height: 40px; width: auto; filter: brightness(0) invert(1);\" alt=\"Stratton Index\">\n        <span style=\"font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em; color: rgba(255,255,255,0.5); text-transform: uppercase;\">Follow-Up · Nov 2025<\u002Fspan>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"eyebrow\" style=\"color: #D9A77A; margin-bottom: 36px;\">For facilitators building a coaching practice<\u002Fdiv>\n        <h1 style=\"font-size: 140px; line-height: 0.95; letter-spacing: -0.045em; max-width: 1400px; color: #fff;\">\n          Know the<br>\n          <span style=\"color: #D9A77A; font-style: italic; font-weight: 500;\">person<\u002Fspan><br>\n          in the leader.\n        <\u002Fh1>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; justify-content: space-between; align-items: flex-end;\">\n        <p style=\"font-size: 22px; color: rgba(255,255,255,0.75); max-width: 540px; line-height: 1.5;\">\n          The Interpersonal Leadership Styles<span class=\"tm\">™<\u002Fspan> assessment, certified. A quick recap of what we covered with <span data-bind=\"facilitatorFirstName\" style=\"color: #fff; font-weight: 500;\">Alex<\u002Fspan><span data-bind=\"facilitatorLastName\" data-bind-prefix=\" \" style=\"color: #fff; font-weight: 500;\"><\u002Fspan>.\n        <\u002Fp>\n        <div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; color: rgba(255,255,255,0.45); text-transform: uppercase; text-align: right;\">\n          Stratton Index<br>\n          strattonindex.com\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────── 02 · RECAP — thanks for the call ───────────── -->\n  <section data-label=\"Recap\">\n    <div class=\"chrome\">\n      <div class=\"mark\"><img src=\"cc5669a2-0f09-4597-b6e7-f259e80c9400\" alt=\"\"><\u002Fdiv>\n      <span class=\"page\">02 · RECAP<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 88px; max-width: 1400px; flex: 1; display: flex; flex-direction: column;\">\n      <div class=\"eyebrow clay\" style=\"margin-bottom: 20px;\"><i class=\"ph-duotone ph-chat-circle-dots\" style=\"color:#C07B4A;\"><\u002Fi> From our conversation<\u002Fdiv>\n      <h2 style=\"margin-bottom: 40px;\">Here's what we heard from you, <span data-bind=\"facilitatorFirstName\" style=\"color: var(--si-navy);\">Alex<\u002Fspan> — and where we'll answer it.<\u002Fh2>\n\n      <div class=\"grid-3\" style=\"gap: 32px;\">\n\n        <!-- 01 -->\n        <div style=\"border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;\">\n          <div style=\"padding: 32px 32px 28px; background: #fff; flex: 1;\">\n            <div class=\"step-num\">01<\u002Fdiv>\n            <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: #C07B4A; text-transform: uppercase; margin-top: 18px; margin-bottom: 8px;\">You said<\u002Fdiv>\n            <h3 style=\"font-size: 24px; line-height: 1.25;\">You coach leaders.<\u002Fh3>\n            <p style=\"font-size: 15px; color: var(--fg-muted); margin-top: 10px; line-height: 1.5;\">And you're looking for a tool that helps guide your clients to <em>real insight<\u002Fem> — not just another personality label.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"padding: 20px 32px; background: var(--si-light-blue-soft); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 14px;\">\n            <i class=\"ph-duotone ph-arrow-down-right\" style=\"color: var(--si-navy); font-size: 20px; flex-shrink: 0;\"><\u002Fi>\n            <div>\n              <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--si-navy); text-transform: uppercase; margin-bottom: 2px;\">We'll answer this on<\u002Fdiv>\n              <div style=\"font-family: var(--font-display); font-size: 15px; color: var(--si-ink); font-weight: 600;\">Slide 5 · The science behind ILS<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 02 -->\n        <div style=\"border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;\">\n          <div style=\"padding: 32px 32px 28px; background: #fff; flex: 1;\">\n            <div class=\"step-num\">02<\u002Fdiv>\n            <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: #C07B4A; text-transform: uppercase; margin-top: 18px; margin-bottom: 8px;\">You said<\u002Fdiv>\n            <h3 style=\"font-size: 24px; line-height: 1.25;\">You want a framework<\u002Fh3>\n            <p style=\"font-size: 15px; color: var(--fg-muted); margin-top: 10px; line-height: 1.5;\">that's rigorous and engaging enough for team-wide rollouts, but warm enough for real 1:1 conversations.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"padding: 20px 32px; background: var(--si-light-blue-soft); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 14px;\">\n            <i class=\"ph-duotone ph-arrow-down-right\" style=\"color: var(--si-navy); font-size: 20px; flex-shrink: 0;\"><\u002Fi>\n            <div>\n              <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--si-navy); text-transform: uppercase; margin-bottom: 2px;\">We'll answer this on<\u002Fdiv>\n              <div style=\"font-family: var(--font-display); font-size: 15px; color: var(--si-ink); font-weight: 600;\">Slide 4 · What the ILS measures<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 03 -->\n        <div style=\"border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;\">\n          <div style=\"padding: 32px 32px 28px; background: #fff; flex: 1;\">\n            <div class=\"step-num\">03<\u002Fdiv>\n            <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: #C07B4A; text-transform: uppercase; margin-top: 18px; margin-bottom: 8px;\">You said<\u002Fdiv>\n            <h3 style=\"font-size: 24px; line-height: 1.25;\">You're evaluating certification<\u002Fh3>\n            <p style=\"font-size: 15px; color: var(--fg-muted); margin-top: 10px; line-height: 1.5;\">to use the ILS in your work and facilitate workshops for your clients.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"padding: 20px 32px; background: var(--si-light-blue-soft); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 14px;\">\n            <i class=\"ph-duotone ph-arrow-down-right\" style=\"color: var(--si-navy); font-size: 20px; flex-shrink: 0;\"><\u002Fi>\n            <div>\n              <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--si-navy); text-transform: uppercase; margin-bottom: 2px;\">We'll answer this on<\u002Fdiv>\n              <div style=\"font-family: var(--font-display); font-size: 15px; color: var(--si-ink); font-weight: 600;\">Slide 10 · Pricing &amp; certification<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot\">\n      <span>Stratton Index · ILS<span class=\"tm\" style=\"color:#6B7280;\">™<\u002Fspan><\u002Fspan>\n      <span>Facilitator Follow-Up<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────── 03 · PROBLEM ───────────── -->\n  <section data-label=\"Problem\" class=\"bg-soft\">\n    <div class=\"chrome\">\n      <div class=\"mark\"><img src=\"cc5669a2-0f09-4597-b6e7-f259e80c9400\" alt=\"\"><\u002Fdiv>\n      <span class=\"page\">03 · THE PROBLEM<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 96px; display:flex; gap: 96px; align-items: center; flex: 1;\">\n      <div style=\"flex: 1;\">\n        <div class=\"eyebrow\" style=\"margin-bottom: 24px;\">The problem<\u002Fdiv>\n        <h2 style=\"margin-bottom: 40px;\">Learning &amp; development stalls without a <span style=\"color: var(--si-navy);\">shared language.<\u002Fspan><\u002Fh2>\n        <p style=\"font-size: 22px; color: var(--fg-muted); max-width: 560px; line-height: 1.55;\">\n          Whether it's a 1:1 coaching conversation or a team offsite, most leaders can describe their strengths. Very few can describe <em>their preferred leadership style<\u002Fem> and how that impacts the people they lead.\n        <\u002Fp>\n        <p style=\"font-size: 22px; color: var(--fg-muted); max-width: 560px; line-height: 1.55; margin-top: 24px;\">\n          Without a framework, feedback stays vague. Teams stay stuck. Progress stays slow.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: 20px;\">\n        <div class=\"card\" style=\"padding: 28px 32px;\">\n          <div style=\"display:flex; gap: 16px; align-items: start;\">\n            <i class=\"ph-duotone ph-quotes\" style=\"font-size: 32px; color: #C07B4A; flex-shrink: 0;\"><\u002Fi>\n            <div>\n              <p style=\"font-size: 19px; color: var(--si-ink); line-height: 1.5; font-style: italic;\">\"I keep getting feedback about how I come across — but no one can tell me what to actually <em>change<\u002Fem>.\"<\u002Fp>\n              <p style=\"font-size: 14px; color: var(--fg-muted); margin-top: 10px;\">— SVP, technology firm<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"padding: 28px 32px;\">\n          <div style=\"display:flex; gap: 16px; align-items: start;\">\n            <i class=\"ph-duotone ph-quotes\" style=\"font-size: 32px; color: #C07B4A; flex-shrink: 0;\"><\u002Fi>\n            <div>\n              <p style=\"font-size: 19px; color: var(--si-ink); line-height: 1.5; font-style: italic;\">\"We've done Myers-Briggs, DISC, StrengthsFinder. Nothing stuck past the offsite. The ILS workshops are where the magic happens.\"<\u002Fp>\n              <p style=\"font-size: 14px; color: var(--fg-muted); margin-top: 10px;\">— Head of L&amp;D, F500 insurance co.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot\">\n      <span>Stratton Index<\u002Fspan>\n      <span>03 / 11<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────── 04 · WHAT THE ILS IS ───────────── -->\n  <section data-label=\"What is ILS\">\n    <div class=\"chrome\">\n      <div class=\"mark\"><img src=\"cc5669a2-0f09-4597-b6e7-f259e80c9400\" alt=\"\"><\u002Fdiv>\n      <span class=\"page\">04 · WHAT IT IS<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 96px;\">\n      <div class=\"eyebrow\" style=\"margin-bottom: 24px;\">What the ILS<span class=\"tm\">™<\u002Fspan> is<\u002Fdiv>\n      <h2 style=\"max-width: 1400px;\">An assessment that reveals <span style=\"color: var(--si-navy);\">how leaders actually show up<\u002Fspan> — and how well they flex.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"grid-2\" style=\"margin-top: 56px; gap: 64px; align-items: start;\">\n      <div>\n        <p style=\"font-size: 21px; line-height: 1.55; color: var(--fg); margin-bottom: 28px;\">\n          The ILS maps interpersonal style across two axes — a <strong style=\"color: var(--si-navy);\">Power axis<\u002Fstrong> (challenging ↔ supporting) and an <strong style=\"color: var(--si-navy);\">Activity axis<\u002Fstrong> (disciplined ↔ spontaneous) — into four recognizable quadrants. It also measures <strong>flexibility<\u002Fstrong>: how well a leader adapts style to context and audience.\n        <\u002Fp>\n\n        <div style=\"border-left: 3px solid #C07B4A; padding: 4px 0 4px 20px; margin: 28px 0;\">\n          <p style=\"font-size: 17px; line-height: 1.5; color: var(--fg); font-style: italic;\">\n            No quadrant is inherently better. Powerful leaders make effective use of their natural style — and flex when the moment calls for it.\n          <\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; flex-direction: column; gap: 14px; margin-top: 32px;\">\n          <div style=\"display:flex; gap: 16px; align-items: center;\"><i class=\"ph-duotone ph-check-circle\" style=\"font-size: 26px; color: var(--si-navy);\"><\u002Fi><span style=\"font-size: 18px;\">Self-assessment (observer ratings available as 360° ILS product)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap: 16px; align-items: center;\"><i class=\"ph-duotone ph-check-circle\" style=\"font-size: 26px; color: var(--si-navy);\"><\u002Fi><span style=\"font-size: 18px;\">10-minute online questionnaire<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap: 16px; align-items: center;\"><i class=\"ph-duotone ph-check-circle\" style=\"font-size: 26px; color: var(--si-navy);\"><\u002Fi><span style=\"font-size: 18px;\">Individual, team, and cohort reports<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap: 16px; align-items: center;\"><i class=\"ph-duotone ph-check-circle\" style=\"font-size: 26px; color: var(--si-navy);\"><\u002Fi><span style=\"font-size: 18px;\">Flexibility score — how well you interrupt your own pattern and flex to others<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- quadrant diagram -->\n      <div style=\"background: var(--si-light-blue-soft); border-radius: 20px; padding: 16px; position: relative; max-width: 560px; justify-self: end;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 4px; background: var(--border);\">\n          <div style=\"background: #fff; padding: 18px 22px; display:flex; flex-direction:column; justify-content:space-between; aspect-ratio: 1;\">\n            <span style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--fg-muted); text-transform: uppercase;\">Challenging · Spontaneous<\u002Fspan>\n            <div>\n              <h3 style=\"font-size: 26px; color: #C07B4A;\">Persuading<\u002Fh3>\n              <p style=\"font-size: 13px; color: var(--fg-muted); margin-top: 4px;\">High-energy, creative, rallies others. <em>What<\u002Fem> &amp; <em>who<\u002Fem>.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: #fff; padding: 18px 22px; display:flex; flex-direction:column; justify-content:space-between; aspect-ratio: 1;\">\n            <span style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--fg-muted); text-transform: uppercase;\">Supporting · Spontaneous<\u002Fspan>\n            <div>\n              <h3 style=\"font-size: 26px; color: #C07B4A;\">Counseling<\u002Fh3>\n              <p style=\"font-size: 13px; color: var(--fg-muted); margin-top: 4px;\">Flexible, harmonizing, the glue.<br><em>Why<\u002Fem> &amp; <em>who<\u002Fem>.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: #fff; padding: 18px 22px; display:flex; flex-direction:column; justify-content:space-between; aspect-ratio: 1;\">\n            <span style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--fg-muted); text-transform: uppercase;\">Challenging · Disciplined<\u002Fspan>\n            <div>\n              <h3 style=\"font-size: 26px; color: var(--si-navy);\">Directing<\u002Fh3>\n              <p style=\"font-size: 13px; color: var(--fg-muted); margin-top: 4px;\">Decisive point people, raise the bar. <em>What<\u002Fem> &amp; <em>when<\u002Fem>.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: #fff; padding: 18px 22px; display:flex; flex-direction:column; justify-content:space-between; aspect-ratio: 1;\">\n            <span style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--fg-muted); text-transform: uppercase;\">Supporting · Disciplined<\u002Fspan>\n            <div>\n              <h3 style=\"font-size: 26px; color: var(--si-navy);\">Analyzing<\u002Fh3>\n              <p style=\"font-size: 13px; color: var(--fg-muted); margin-top: 4px;\">Precise, thoughtful, loyal.<br><em>Why<\u002Fem> &amp; <em>how<\u002Fem>.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot\">\n      <span>Stratton Index<\u002Fspan>\n      <span>04 / 11<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────── 05 · SCIENCE / CREDIBILITY ───────────── -->\n  <section data-label=\"Science\" class=\"bg-navy\">\n    <div class=\"chrome\" style=\"color: rgba(255,255,255,0.6);\">\n      <div class=\"mark\"><img src=\"cc5669a2-0f09-4597-b6e7-f259e80c9400\" alt=\"\" style=\"filter: brightness(0) invert(1);\"><\u002Fdiv>\n      <span class=\"page\" style=\"color: rgba(255,255,255,0.55);\">05 · THE SCIENCE<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 96px;\">\n      <div class=\"eyebrow\" style=\"color: #9BB8E9; margin-bottom: 24px;\">Not another personality quiz<\u002Fdiv>\n      <h2 style=\"max-width: 1400px; color:#fff;\">25 years of validation. <span style=\"color: #D9A77A; font-style: i  personality assessment — and refined over 25 years with leaders in the field.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"foot\" style=\"color: rgba(255,255,255,0.5);\">\n      <span>Stratton Index<\u002Fspan>\n      <span>05 / 11<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────── 06 · SAMPLE REPORT ───────────── -->\n  <section data-label=\"Sample Report\" class=\"bg-soft\">\n    <div class=\"chrome\">\n      <div class=\"mark\"><img src=\"cc5669a2-0f09-4597-b6e7-f259e80c9400\" alt=\"\"><\u002Fdiv>\n      <span class=\"page\">06 · WHAT YOU GET<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 96px; display:flex; gap: 72px; align-items: center; flex: 1;\">\n      <div style=\"flex: 1;\">\n        <div class=\"eyebrow\" style=\"margin-bottom: 24px;\">What each participant receives<\u002Fdiv>\n        <h2 style=\"margin-bottom: 32px;\">A personal 4-page report,<br><span style=\"color: var(--si-navy);\">paired with a reference booklet.<\u002Fspan><\u002Fh2>\n        <p style=\"font-size: 20px; color: var(--fg-muted); line-height: 1.55; margin-bottom: 40px;\">\n          Clean, specific, free of jargon. Written to <em>open<\u002Fem> a coaching conversation, not close one.\n        <\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 16px;\">\n          <div style=\"display:flex; gap: 14px; align-items:center;\"><i class=\"ph-duotone ph-compass\" style=\"font-size:24px; color: var(--si-navy);\"><\u002Fi><span style=\"font-size: 17px;\">Your <strong>Leadership Style<\u002Fstrong> — one of the four quadrants<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap: 14px; align-items:center;\"><i class=\"ph-duotone ph-identification-card\" style=\"font-size:24px; color: var(--si-navy);\"><\u002Fi><span style=\"font-size: 17px;\">Your <strong>Specific Style<\u002Fstrong> — one of 21 distinct profiles<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap: 14px; align-items:center;\"><i class= T 2025<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Your Leadership Style -->\n          <div style=\"margin-top: 28px; background: var(--si-light-blue-soft); border-left: 4px solid var(--si-navy); padding: 16px 20px; border-radius: 4px;\">\n            <div style=\"font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; color: var(--si-navy); text-transform: uppercase;\">Your Leadership Style is<\u002Fdiv>\n            <div style=\"font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--si-navy); margin-top: 2px;\">Directing<\u002Fdiv>\n            <div style=\"font-size: 11px; color: var(--fg-muted); margin-top: 6px; line-height: 1.5;\">Active, independent, and ambitious; appears self-confident. Takes initiative and makes decisions rapidly, often with a sense of urgency.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Specific Style + Flexibility row -->\n          <div style=\"margin-top: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n            <div style=\"padding: 14px 16px; background: #F7F8FA; border-radius: 6px;\">\n              <div style=\"font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; color: var(--fg-muted); text-transform: uppercase;\">Your Specific Style<\u002Fdiv>\n              <div style=\"font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--si-ink); margin-top: 2px; line-height: 1;\">17<span style=\"font-size: 13px; font-weight: 500; color: var(--fg-muted); margin-left: 4px;\">of 21<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size: 10px; color: var(--fg-muted); margin-top: 6px; line-height: 1.45;\">Looks for results, not excuses. Likes leadership roles and getting projects done quickly.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding: 14px 16px; background: #FAEEE3; border-radius: 6px;\">\n              <div style=\"font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; color: #8B4A1F; text-transform: uppercase;\">Perception of Flexibility<\u002Fdiv>\n              <div style=\"font-family: var(--font-display); font-size: 15px; font-weight: 700; color: #8B4A1F; margin-top: 4px; line-height: 1.2;\">Situationally<br>Flexible<\u002Fdiv>\n              <div style=\"font-size: 10px; color: var(--fg-muted); margin-top: 6px; line-height: 1.45;\">Generally flexes effectively; may stiffen under pressure.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Style description preview -->\n          <div style=\"margin-top: 18px;\">\n            <div style=\"font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--si-ink); margin-bottom: 10px;\">From your style description<\u002Fdiv>\n            <div style=\"color: var(--fg-muted);\">\n              <p style=\"font-size: 9.5px; line-height: 1.5;\">Enjoys being the leader with a take-charge attitude. Makes decisions rapidly, often with a sense of urgency. May appear business-like, mainly concerned with efficiency over relationships.<\u002Fp>\n              <p style=\"font-size: 9.5px; line-height: 1.5; margin-top: 8px;\">Can become tense when a situation feels out of their control.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Your flex move callout -->\n          <div style=\"margin-top: 18px; display: flex; gap: 12px; align-items: stretch; border-top: 1px dashed var(--border); padding-top: 14px;\">\n            <div style=\"width: 40px; flex-shrink: 0; display:flex; flex-direction: column; align-items: center; justify-content: center; background: var(--si-navy); border-radius: 6px; color: #fff; padding: 6px 0;\">\n              <i class=\"ph-duotone ph-ear\" style=\"font-size: 20px;\"><\u002Fi>\n              <div style=\"font-family: var(--font-mono); font-size: 7px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; opacity: 0.75;\">Flex<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex: 1; display:flex; flex-direction: column; justify-content: center;\">\n              <div style=\"font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; color: var(--fg-muted); text-transform: uppercase;\">Your flex move<\u002Fdiv>\n              <div style=\"font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--si-ink); line-height: 1.1; margin-top: 2px;\">Listen.<\u002Fdiv>\n              <div style=\"font-size: 9.5px; color: var(--fg-muted); line-height: 1.5; margin-top: 3px;\">In your next three 1:1s, ask a question — and wait for the answer before responding.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- footer -->\n          <div style=\"position: absolute; bottom: 20px; left: 40px; right: 40px; display:flex; justify-content:space-between; font-family: var(--font-mono); font-size: 9px; color: var(--fg-muted); letter-spacing: 0.06em;\">\n            <span>Marcus Chen · Commercial Lending Cohort<\u002Fspan>\n            <span>strattonindex.com<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"foot\">\n      <span>Stratton Index · Sample shown — final reports are personalized<\u002Fspan>\n      <span>06 / 11<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────────── 07 · HOW IT WORKS — 3 STEPS ───────────── -->\n  <section data-label=\"How It Works\">\n    <div class=\"chrome\">\n      <div class=\"mark\"><img src=\"cc5669a2-0f09-4597-b6e7-f259e80c9400\" alt=\"\"><\u002Fdiv>\n      <span class=\"page\">07 · HOW IT WORKS<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 96px;\">\n      <div class=\"eyebrow\" style=\"margin-bottom: 24px;\">Certification is self-paced<\u002Fdiv>\n      <h2 style=\"max-width: 1400px;\">From enrolled to certified in <span style=\"color: var(--si-navy);\">about five hours<\u002Fspan> — on your schedule.<\u002Fh2>\n      <p style=\"font-size: 19px; color: var(--fg-muted); margi
